# backend/deploy/docker-compose.yml
# Local dev stack for Amendia: mongo + rabbitmq + stub exception generator + ingestor +
# agent-runtime + process-registry. Run from the repo root:
#   docker compose -f backend/deploy/docker-compose.yml up --build
#
# The process-registry onboards the wire-repair-standard seed to `active` on startup and is
# health-gated, so ingestor/agent-runtime only start once the pack resolves. Editing the seed
# (BPMN/manifest/capabilities/schemas) changes immutable, already-onboarded versions — bring the
# stack down with a fresh volume first:  docker compose -f backend/deploy/docker-compose.yml down -v

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dev IdP. The committed realm (amendia-dev) is imported on startup.
  #
  # DEV-NETWORKING FOOTGUN (the #1 setup gotcha): tokens carry the *browser-facing*
  # issuer `http://localhost:8087/realms/amendia-dev` (set via KC_HOSTNAME) so the
  # SPA's PKCE redirect and the services' `iss` check agree. But `localhost:8087`
  # is NOT reachable from inside the compose network, so services must fetch JWKS
  # via the internal alias `http://keycloak:8080/.../certs` — that is exactly what
  # each service's `*_AUTH_JWKS_URI` below does (it bypasses OIDC discovery). See
  # backend/deploy/keycloak/README.md.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    ports:
      - "8087:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8087
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Identity platform service: (iss,sub) → Amendia user + roles, JIT provisioning,
  # role admin. Seeds role assignments (by email) on startup.
  identity:
    build:
      # Build context is the repo root so both `libs/` and the service are visible.
      context: ../..
      dockerfile: backend/services/platform/identity/Dockerfile
    ports:
      - "8086:8086"
    environment:
      IDENTITY_MONGO_URI: mongodb://mongodb:27017
      IDENTITY_MONGO_DB: amendia
      IDENTITY_SEED_ON_STARTUP: "true"
      IDENTITY_JIT_DEFAULT_STATUS: active
      # Shared internal token guarding /internal/resolve-principal (X-Amendia-Internal).
      IDENTITY_INTERNAL_TOKEN: dev-internal-token
      IDENTITY_AUTH_ISSUER: http://localhost:8087/realms/amendia-dev
      IDENTITY_AUTH_AUDIENCE: amendia-api
      IDENTITY_AUTH_JWKS_URI: http://keycloak:8080/realms/amendia-dev/protocol/openid-connect/certs
      IDENTITY_LOG_LEVEL: INFO
      IDENTITY_ENABLE_DEV_CORS: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8086/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_started

  # Notification platform service: consumes amendia.events and fans out thin
  # invalidation signals to browsers over SSE (real-time HITL dashboard, no polling).
  notification-service:
    build:
      # Build context is the repo root so both `libs/` and the service are visible.
      context: ../..
      dockerfile: backend/services/platform/notification-service/Dockerfile
    ports:
      - "8088:8088"
    environment:
      NOTIFICATION_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      NOTIFICATION_AUTH_ISSUER: http://localhost:8087/realms/amendia-dev
      NOTIFICATION_AUTH_AUDIENCE: amendia-api
      NOTIFICATION_AUTH_JWKS_URI: http://keycloak:8080/realms/amendia-dev/protocol/openid-connect/certs
      NOTIFICATION_AUTH_IDENTITY_BASE_URL: http://identity:8086
      NOTIFICATION_AUTH_INTERNAL_TOKEN: dev-internal-token
      NOTIFICATION_LOG_LEVEL: INFO
      NOTIFICATION_ENABLE_DEV_CORS: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started

  stub-exception-generator:
    build:
      # Build context is the repo root so both `libs/` and `stub_exception_generator/` are visible.
      context: ../..
      dockerfile: stub_exception_generator/Dockerfile
    ports:
      - "8081:8081"
    environment:
      STUBEXC_MONGO_URI: mongodb://mongodb:27017
      STUBEXC_MONGO_DB: amendia
      STUBEXC_MONGO_COLLECTION: exceptions
      STUBEXC_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # Service name (not localhost) so the fetch_url in events resolves from other containers.
      STUBEXC_SERVICE_BASE_URL: http://stub-exception-generator:8081
      STUBEXC_LOG_LEVEL: INFO
      # Dev-only permissive CORS so a separately-served webui can call directly.
      STUBEXC_ENABLE_DEV_CORS: "true"
      # --- auth (amendia_auth) ---
      STUBEXC_AUTH_ISSUER: http://localhost:8087/realms/amendia-dev
      STUBEXC_AUTH_AUDIENCE: amendia-api
      STUBEXC_AUTH_JWKS_URI: http://keycloak:8080/realms/amendia-dev/protocol/openid-connect/certs
      STUBEXC_AUTH_IDENTITY_BASE_URL: http://identity:8086
      STUBEXC_AUTH_INTERNAL_TOKEN: dev-internal-token
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started

  ingestor:
    build:
      # Build context is the repo root so both `libs/` and `backend/services/ingestor/` are visible.
      context: ../..
      dockerfile: backend/services/ingestor/Dockerfile
    ports:
      - "8082:8082"
    environment:
      INGESTOR_MONGO_URI: mongodb://mongodb:27017
      INGESTOR_MONGO_DB: amendia
      INGESTOR_MONGO_COLLECTION: ingestions
      INGESTOR_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      INGESTOR_RABBITMQ_QUEUE: ingestor.exception_raised.v1
      INGESTOR_RABBITMQ_REPLY_QUEUE: ingestor.dispatch_replies.v1
      INGESTOR_STUB_BASE_URL: http://stub-exception-generator:8081
      INGESTOR_REGISTRY_BASE_URL: http://process-registry:8084
      INGESTOR_RESOLVE_RETRY_SECONDS: "60"
      INGESTOR_LOG_LEVEL: INFO
      INGESTOR_ENABLE_DEV_CORS: "true"
      # --- auth (amendia_auth) ---
      INGESTOR_AUTH_ISSUER: http://localhost:8087/realms/amendia-dev
      INGESTOR_AUTH_AUDIENCE: amendia-api
      INGESTOR_AUTH_JWKS_URI: http://keycloak:8080/realms/amendia-dev/protocol/openid-connect/certs
      INGESTOR_AUTH_IDENTITY_BASE_URL: http://identity:8086
      INGESTOR_AUTH_INTERNAL_TOKEN: dev-internal-token
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      stub-exception-generator:
        condition: service_started
      process-registry:
        condition: service_healthy
      identity:
        condition: service_started

  agent-runtime:
    build:
      # Build context is the repo root so both `libs/` and `backend/services/agent-runtime/` are visible.
      context: ../..
      dockerfile: backend/services/agent-runtime/Dockerfile
    ports:
      - "8083:8083"
    environment:
      AGENTRT_MONGO_URI: mongodb://mongodb:27017
      AGENTRT_MONGO_DB: amendia
      AGENTRT_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AGENTRT_RABBITMQ_DISPATCH_QUEUE: agent-runtime.exception_dispatched.v1
      AGENTRT_REGISTRY_BASE_URL: http://process-registry:8084
      AGENTRT_SELF_BASE_URL: http://agent-runtime:8083
      # Simulation-mode capabilities (no external LLM/MCP calls) behind the executor seam.
      AGENTRT_SIMULATION_MODE: "true"
      AGENTRT_ENABLE_SEED_API: "true"
      AGENTRT_ENABLE_DEBUG_API: "true"
      # Registry owns catalog writes (ownership split); it seeds the shared collections
      # through its onboarding pipeline, so the runtime does not self-seed here.
      AGENTRT_SEED_ON_STARTUP: "false"
      AGENTRT_LOG_LEVEL: INFO
      AGENTRT_ENABLE_DEV_CORS: "true"
      # --- auth (amendia_auth) ---
      AGENTRT_AUTH_ISSUER: http://localhost:8087/realms/amendia-dev
      AGENTRT_AUTH_AUDIENCE: amendia-api
      AGENTRT_AUTH_JWKS_URI: http://keycloak:8080/realms/amendia-dev/protocol/openid-connect/certs
      AGENTRT_AUTH_IDENTITY_BASE_URL: http://identity:8086
      AGENTRT_AUTH_INTERNAL_TOKEN: dev-internal-token
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      process-registry:
        condition: service_healthy
      stub-exception-generator:
        condition: service_started
      identity:
        condition: service_started

  process-registry:
    build:
      # Build context is the repo root so `libs/` and `backend/services/` are visible.
      context: ../..
      dockerfile: backend/services/process-registry/Dockerfile
    ports:
      - "8084:8084"
    environment:
      REGISTRY_MONGO_URI: mongodb://mongodb:27017
      REGISTRY_MONGO_DB: amendia
      REGISTRY_SEED_ON_STARTUP: "true"
      REGISTRY_LOG_LEVEL: INFO
      REGISTRY_ENABLE_DEV_CORS: "true"
      # --- auth (amendia_auth) ---
      REGISTRY_AUTH_ISSUER: http://localhost:8087/realms/amendia-dev
      REGISTRY_AUTH_AUDIENCE: amendia-api
      REGISTRY_AUTH_JWKS_URI: http://keycloak:8080/realms/amendia-dev/protocol/openid-connect/certs
      REGISTRY_AUTH_IDENTITY_BASE_URL: http://identity:8086
      REGISTRY_AUTH_INTERNAL_TOKEN: dev-internal-token
    healthcheck:
      # Ready only once the seed pack is onboarded + active (consumers depend on this).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8084/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      mongodb:
        condition: service_healthy
      identity:
        condition: service_started

  webui:
    build:
      # Context is the webui/ dir; the multi-stage Dockerfile builds the SPA and
      # serves it via nginx, proxying /api/<service> to the backends on this network.
      context: ../../webui
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    depends_on:
      stub-exception-generator:
        condition: service_started
      ingestor:
        condition: service_started
      agent-runtime:
        condition: service_started
      process-registry:
        condition: service_healthy
      notification-service:
        condition: service_started

volumes:
  mongo_data:
