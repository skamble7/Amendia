<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" viewBox="0 0 680 280" role="img">
<title>Amendia authentication flow</title>
<desc>Six steps: the user signs in via redirect to the IdP with PKCE, tokens are issued to the SPA, API calls carry the bearer JWT, the shared library validates the token, the identity service resolves the principal to an Amendia user and roles with just-in-time provisioning on first login, and route guards enforce roles and separation of duties.</desc>
<style>
text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
.tt { font-size: 14px; font-weight: 500; }
.st { font-size: 12px; font-weight: 400; }
.purple rect { fill: #EEEDFE; stroke: #534AB7; }
.purple .tt { fill: #3C3489; } .purple .st { fill: #534AB7; }
.teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.teal .tt { fill: #085041; } .teal .st { fill: #0F6E56; }
.gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.gray .tt { fill: #444441; } .gray .st { fill: #5F5E5A; }
.arr { stroke: #73726C; }
@media (prefers-color-scheme: dark) {
.purple rect { fill: #3C3489; stroke: #AFA9EC; }
.purple .tt { fill: #CECBF6; } .purple .st { fill: #AFA9EC; }
.teal rect { fill: #085041; stroke: #5DCAA5; }
.teal .tt { fill: #9FE1CB; } .teal .st { fill: #5DCAA5; }
.gray rect { fill: #444441; stroke: #B4B2A9; }
.gray .tt { fill: #D3D1C7; } .gray .st { fill: #B4B2A9; }
.arr { stroke: #9C9A92; }
}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="gray">
<rect x="40" y="40" width="190" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="135" y="58" text-anchor="middle" dominant-baseline="central">Sign in</text>
<text class="st" x="135" y="78" text-anchor="middle" dominant-baseline="central">redirect to IdP, PKCE</text>
</g>
<line class="arr" x1="230" y1="68" x2="241" y2="68" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="gray">
<rect x="245" y="40" width="190" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="58" text-anchor="middle" dominant-baseline="central">Tokens issued</text>
<text class="st" x="340" y="78" text-anchor="middle" dominant-baseline="central">ID + access JWT to SPA</text>
</g>
<line class="arr" x1="435" y1="68" x2="446" y2="68" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="purple">
<rect x="450" y="40" width="190" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="545" y="58" text-anchor="middle" dominant-baseline="central">API call</text>
<text class="st" x="545" y="78" text-anchor="middle" dominant-baseline="central">Bearer on every request</text>
</g>
<path class="arr" d="M545 96 L545 138 L135 138 L135 176" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="teal">
<rect x="40" y="180" width="190" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="135" y="198" text-anchor="middle" dominant-baseline="central">Validate token</text>
<text class="st" x="135" y="218" text-anchor="middle" dominant-baseline="central">sig, iss, aud, exp checks</text>
</g>
<line class="arr" x1="230" y1="208" x2="241" y2="208" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="purple">
<rect x="245" y="180" width="190" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="198" text-anchor="middle" dominant-baseline="central">Resolve principal</text>
<text class="st" x="340" y="218" text-anchor="middle" dominant-baseline="central">map to user, load roles</text>
</g>
<line class="arr" x1="435" y1="208" x2="446" y2="208" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="purple">
<rect x="450" y="180" width="190" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="545" y="198" text-anchor="middle" dominant-baseline="central">Enforce</text>
<text class="st" x="545" y="218" text-anchor="middle" dominant-baseline="central">role guard + SoD rules</text>
</g>
</svg>
