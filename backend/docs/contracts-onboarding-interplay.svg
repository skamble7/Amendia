<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430" role="img">
<title>Onboarding-time interplay of Amendia contracts</title>
<desc>Capability descriptors and artifact schemas are registered first, then referenced by a ProcessPack draft, which passes onboarding validation and becomes an active pack with pinned versions.</desc>
<style>
text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
.tt { font-size: 14px; font-weight: 500; }
.st { font-size: 12px; font-weight: 400; }
.purple rect { fill: #EEEDFE; stroke: #534AB7; }
.purple .tt { fill: #3C3489; } .purple .st { fill: #534AB7; }
.teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.teal .tt { fill: #085041; } .teal .st { fill: #0F6E56; }
.coral rect { fill: #FAECE7; stroke: #993C1D; }
.coral .tt { fill: #712B13; } .coral .st { fill: #993C1D; }
.gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.gray .tt { fill: #444441; } .gray .st { fill: #5F5E5A; }
.arr { stroke: #73726C; }
@media (prefers-color-scheme: dark) {
.purple rect { fill: #3C3489; stroke: #AFA9EC; }
.purple .tt { fill: #CECBF6; } .purple .st { fill: #AFA9EC; }
.teal rect { fill: #085041; stroke: #5DCAA5; }
.teal .tt { fill: #9FE1CB; } .teal .st { fill: #5DCAA5; }
.coral rect { fill: #712B13; stroke: #F0997B; }
.coral .tt { fill: #F5C4B3; } .coral .st { fill: #F0997B; }
.gray rect { fill: #444441; stroke: #B4B2A9; }
.gray .tt { fill: #D3D1C7; } .gray .st { fill: #B4B2A9; }
.arr { stroke: #9C9A92; }
}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="purple">
<rect x="110" y="40" width="200" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="210" y="58" text-anchor="middle" dominant-baseline="central">Capability descriptor</text>
<text class="st" x="210" y="78" text-anchor="middle" dominant-baseline="central">who or what runs steps</text>
</g>
<g class="teal">
<rect x="370" y="40" width="200" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="470" y="58" text-anchor="middle" dominant-baseline="central">Artifact schema</text>
<text class="st" x="470" y="78" text-anchor="middle" dominant-baseline="central">shape of step data</text>
</g>
<line class="arr" x1="210" y1="96" x2="292" y2="146" stroke-width="1.5" marker-end="url(#arrow)"/>
<line class="arr" x1="470" y1="96" x2="388" y2="146" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="coral">
<rect x="235" y="150" width="210" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="168" text-anchor="middle" dominant-baseline="central">ProcessPack (draft)</text>
<text class="st" x="340" y="188" text-anchor="middle" dominant-baseline="central">BPMN + bindings + rules</text>
</g>
<line class="arr" x1="340" y1="206" x2="340" y2="236" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="gray">
<rect x="225" y="240" width="230" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="258" text-anchor="middle" dominant-baseline="central">Onboarding validation</text>
<text class="st" x="340" y="278" text-anchor="middle" dominant-baseline="central">every reference must resolve</text>
</g>
<line class="arr" x1="340" y1="296" x2="340" y2="326" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="coral">
<rect x="225" y="330" width="230" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="348" text-anchor="middle" dominant-baseline="central">Active pack</text>
<text class="st" x="340" y="368" text-anchor="middle" dominant-baseline="central">versions pinned, triage live</text>
</g>
</svg>
