<svg xmlns="http://www.w3.org/2000/svg" width="680" height="590" viewBox="0 0 680 590" role="img">
<title>Runtime interplay of Amendia contracts</title>
<desc>An ingested exception is triaged and dispatched with a pinned pack, creating a process instance. The instance loops through BPMN steps: a capability runs, its artifact is schema-validated, and a HITL task gates the step when human oversight is required, until the exception is resolved.</desc>
<style>
text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
.tt { font-size: 14px; font-weight: 500; }
.st { font-size: 12px; font-weight: 400; }
.purple rect { fill: #EEEDFE; stroke: #534AB7; }
.purple .tt { fill: #3C3489; } .purple .st { fill: #534AB7; }
.teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.teal .tt { fill: #085041; } .teal .st { fill: #0F6E56; }
.coral rect { fill: #FAECE7; stroke: #993C1D; }
.coral .tt { fill: #712B13; } .coral .st { fill: #993C1D; }
.gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.gray .tt { fill: #444441; } .gray .st { fill: #5F5E5A; }
.amber rect { fill: #FAEEDA; stroke: #854F0B; }
.amber .tt { fill: #633806; } .amber .st { fill: #854F0B; }
.loop { fill: none; stroke: #888780; }
.looplabel { font-size: 14px; font-weight: 500; fill: #444441; }
.loopnote { font-size: 12px; fill: #5F5E5A; }
.arr { stroke: #73726C; }
@media (prefers-color-scheme: dark) {
.purple rect { fill: #3C3489; stroke: #AFA9EC; }
.purple .tt { fill: #CECBF6; } .purple .st { fill: #AFA9EC; }
.teal rect { fill: #085041; stroke: #5DCAA5; }
.teal .tt { fill: #9FE1CB; } .teal .st { fill: #5DCAA5; }
.coral rect { fill: #712B13; stroke: #F0997B; }
.coral .tt { fill: #F5C4B3; } .coral .st { fill: #F0997B; }
.gray rect { fill: #444441; stroke: #B4B2A9; }
.gray .tt { fill: #D3D1C7; } .gray .st { fill: #B4B2A9; }
.amber rect { fill: #633806; stroke: #EF9F27; }
.amber .tt { fill: #FAC775; } .amber .st { fill: #EF9F27; }
.loop { stroke: #9C9A92; }
.looplabel { fill: #D3D1C7; }
.loopnote { fill: #B4B2A9; }
.arr { stroke: #9C9A92; }
}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="gray">
<rect x="230" y="40" width="220" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="58" text-anchor="middle" dominant-baseline="central">Exception ingested</text>
<text class="st" x="340" y="78" text-anchor="middle" dominant-baseline="central">envelope fetched</text>
</g>
<line class="arr" x1="340" y1="96" x2="340" y2="132" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="coral">
<rect x="230" y="136" width="220" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="154" text-anchor="middle" dominant-baseline="central">Dispatch</text>
<text class="st" x="340" y="174" text-anchor="middle" dominant-baseline="central">triage pins a pack</text>
</g>
<line class="arr" x1="340" y1="192" x2="340" y2="228" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="purple">
<rect x="230" y="232" width="220" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="250" text-anchor="middle" dominant-baseline="central">Process instance</text>
<text class="st" x="340" y="270" text-anchor="middle" dominant-baseline="central">checkpointed execution</text>
</g>
<line class="arr" x1="340" y1="288" x2="340" y2="324" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect class="loop" x="50" y="328" width="580" height="146" rx="16" stroke-dasharray="4 4" stroke-width="0.75"/>
<text class="looplabel" x="70" y="352">Execution loop</text>
<g class="purple">
<rect x="70" y="374" width="165" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="152" y="392" text-anchor="middle" dominant-baseline="central">Capability runs</text>
<text class="st" x="152" y="412" text-anchor="middle" dominant-baseline="central">typed inputs</text>
</g>
<line class="arr" x1="235" y1="402" x2="247" y2="402" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="teal">
<rect x="251" y="374" width="165" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="333" y="392" text-anchor="middle" dominant-baseline="central">Artifact written</text>
<text class="st" x="333" y="412" text-anchor="middle" dominant-baseline="central">schema-checked</text>
</g>
<line class="arr" x1="416" y1="402" x2="428" y2="402" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="amber">
<rect x="432" y="374" width="165" height="56" rx="8" stroke-width="0.75"/>
<text class="tt" x="514" y="392" text-anchor="middle" dominant-baseline="central">HITL gate</text>
<text class="st" x="514" y="412" text-anchor="middle" dominant-baseline="central">human decides</text>
</g>
<text class="loopnote" x="340" y="454" text-anchor="middle">&#8635; repeats per step until the process completes</text>
<line class="arr" x1="340" y1="474" x2="340" y2="502" stroke-width="1.5" marker-end="url(#arrow)"/>
<g class="gray">
<rect x="240" y="506" width="200" height="44" rx="8" stroke-width="0.75"/>
<text class="tt" x="340" y="528" text-anchor="middle" dominant-baseline="central">Exception resolved</text>
</g>
</svg>
