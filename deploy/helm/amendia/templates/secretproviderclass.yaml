{{- /* Vault-backed secrets via the Secrets Store CSI driver + Vault provider (ADR-022 Part B).
       Per service: a SecretProviderClass that reads ONLY that service's Vault path (K8s auth
       with the service's ServiceAccount) and syncs the keys into a K8s Secret consumed via
       secretKeyRef. No plaintext ever in Git/values/Secrets (ADR-016 trap 1).
       Agent Injector is the documented alternative (vault.method=agent-injector → pod
       annotations instead; secrets rendered to /vault/secrets and consumed as file: refs). */ -}}
{{- $root := . -}}
{{- if and .Values.vault.enabled (eq .Values.vault.method "csi") -}}
{{- $entries := dict -}}
{{- range $name, $svc := .Values.services -}}{{- $_ := set $entries $name $svc -}}{{- end -}}
{{- if and .Values.capabilityWorker.enabled (eq .Values.executionMode "nemoclaw") -}}
{{- $_ := set $entries "capability-worker" .Values.capabilityWorker -}}
{{- end -}}
{{- range $name, $svc := $entries }}
{{- if $svc.secretEnv }}
{{- $fullname := include "amendia.svc" (dict "root" $root "name" $name) }}
{{- $vaultPath := printf "%s/%s" (trimPrefix "secret/data/" $root.Values.vault.secretBasePath) $name }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $fullname }}
  labels:
{{ include "amendia.labels" (dict "root" $root "name" $name) | indent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ $root.Values.vault.address | quote }}
    roleName: {{ $root.Values.vault.role | quote }}
    # KV-v2 path holding this service's secret keys (K8s auth; the SA is bound to the role).
    objects: |
      {{- range $svc.secretEnv }}
      - objectName: {{ . | quote }}
        secretPath: {{ printf "secret/data/amendia/%s" $name | quote }}
        secretKey: {{ . | quote }}
      {{- end }}
  # Sync into a K8s Secret consumed via secretKeyRef (see the Deployment env).
  secretObjects:
    - secretName: {{ $fullname }}-secrets
      type: Opaque
      data:
        {{- range $svc.secretEnv }}
        - objectName: {{ . | quote }}
          key: {{ . | quote }}
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
