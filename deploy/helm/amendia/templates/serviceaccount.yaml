{{- /* One ServiceAccount per service (+ the capability-worker). Vault K8s auth binds these
       ServiceAccounts to a Vault role scoped to each service's secret paths (ADR-022 Part B). */ -}}
{{- $root := . -}}
{{- $names := keys .Values.services | sortAlpha -}}
{{- if and .Values.capabilityWorker.enabled (eq .Values.executionMode "nemoclaw") -}}
{{- $names = append $names "capability-worker" -}}
{{- end -}}
{{- range $name := $names }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "amendia.svc" (dict "root" $root "name" $name) }}
  labels:
{{ include "amendia.labels" (dict "root" $root "name" $name) | indent 4 }}
  {{- with $root.Values.serviceAccountAnnotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
{{- end }}
