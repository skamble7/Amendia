# Serves the built SPA on :8085 and proxies /api/<service> to the backends,
# mirroring the Vite dev proxy so the app is single-origin (no CORS needed).
server {
    listen 8085;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxies (service names resolve on the compose network)
    location /api/stub/ {
        proxy_pass http://stub-exception-generator:8081/;
    }
    location /api/ingestor/ {
        proxy_pass http://ingestor:8082/;
    }
    location /api/runtime/ {
        proxy_pass http://agent-runtime:8083/;
    }
    location /api/registry/ {
        proxy_pass http://process-registry:8084/;
    }
    location /api/identity/ {
        proxy_pass http://identity:8086/;
    }
    # SSE stream — needs a long read timeout (nginx default 60s would drop idle
    # streams between heartbeats). proxy_buffering off is inherited from below.
    location /api/notifications/ {
        proxy_pass http://notification-service:8088/;
        proxy_read_timeout 3600s;
    }

    # long-lived connections (SSE): unbuffered, HTTP/1.1 keep-alive
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
}
